<p-card>
  @if (analysis) {
    <div class="flex flex-col gap-5">
      <p class="text-sm font-semibold">RESULTADO DEL MODELO</p>

      <div class="flex flex-row items-center justify-between">
        <p class="font-bold text-2xl m-0">{{ analysis.class }}</p>
        <p-tag
          [pt]="{ label: { class: 'text-sm font-normal' } }"
          [icon]="statusIcon"
          [severity]="statusSeverity"
          [value]="statusLabel"
          rounded
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <p class="font-light">Nivel de Confianza</p>
        <p-progressbar [value]="analysis.confidence * 100" [color]="confidenceColor" />
      </div>
    </div>
  } @else {
    <div class="flex flex-col gap-2.5 items-center justify-center">
      <i class="pi pi-wave-pulse" style="font-size: xx-large"></i>
      <p class="font-light text-center">
        Ejecute un análisis para ver los detalles técnicos de la clasificación.
      </p>
    </div>
  }
</p-card>

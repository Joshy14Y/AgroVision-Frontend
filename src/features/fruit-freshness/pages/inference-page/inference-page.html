<div class="w-full max-w-7xl mx-auto p-5">
  <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
    <div class="col-span-1 md:col-span-8">
      <app-upload-file-component
        (fileSelected)="onFileReceived($event)"
        [isLoading]="isLoading()"
      />
    </div>

    <div class="col-span-1 md:col-span-4 flex flex-col gap-5">
      <app-inference-result-component [analysis]="analysis()" />
      <app-inference-history-component [history]="history()" />
    </div>
  </div>
</div>
